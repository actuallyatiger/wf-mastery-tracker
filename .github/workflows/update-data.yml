name: Update Public Export Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh dataset
        run: npm run update:data

      - name: Commit data changes
        run: |
          if [[ -n "$(git status --porcelain public/data/items.json)" ]]; then
            git config user.name "${GITHUB_ACTOR}"
            git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
            git add public/data/items.json
            git commit -m "chore: update Public Export dataset"
            git push
          else
            echo "No dataset changes to commit."
          fi
